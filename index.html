<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftClean Booking Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .service-card.active { border-color: #0ea5e9; background-color: #f0f9ff; border-width: 2px; transform: translateY(-2px); }
        .qty-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 12px; font-weight: bold; background: #f8fafc; border: 1px solid #e2e8f0; }
        .qty-btn:active { background: #e2e8f0; transform: scale(0.9); }
        #submit-btn:disabled { cursor: wait; opacity: 0.6; }
        /* Add a pulsing effect when saving */
        @keyframes pulse-save { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        .saving-pulse { animation: pulse-save 1s infinite; }
    </style>
</head>
<body class="bg-gray-50 pb-52 font-sans selection:bg-blue-100">

    <header id="header-bg" class="p-10 text-white shadow-xl text-center rounded-b-[3rem]">
        <h1 id="biz-name" class="text-3xl font-black uppercase tracking-tighter"></h1>
        <p id="biz-tagline" class="mt-2 text-sm font-medium opacity-90 italic"></p>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-8 -mt-6">
        <section class="bg-white rounded-[2rem] shadow-lg p-6 border border-gray-100">
            <h2 class="text-lg font-black mb-5 flex items-center gap-2">
                <span class="bg-blue-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-[10px]">1</span>
                Contact Details
            </h2>
            <div class="space-y-4">
                <input type="text" id="cust-name" placeholder="Full Name" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-400 transition-all">
                <input type="tel" id="cust-phone" placeholder="M-Pesa Number" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-400 transition-all">
                <textarea id="location-desc" placeholder="Specific Location (e.g., Section 9, Blue Post area)" rows="2" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-400 transition-all"></textarea>
            </div>
        </section>

        <section id="summary-card" class="hidden bg-blue-50 rounded-2xl p-4 border border-blue-100">
            <h3 class="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-2">Selected for Pick-up</h3>
            <div id="summary-list" class="text-xs text-blue-900 font-bold space-y-1"></div>
        </section>

        <section id="services-master" class="space-y-8">
            <h2 class="text-lg font-black px-2 flex items-center gap-2">
                <span class="bg-blue-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-[10px]">2</span>
                Select Services
            </h2>
        </section>
    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t p-6 shadow-2xl z-50">
        <div class="max-w-md mx-auto space-y-4">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-[10px] text-gray-400 uppercase font-black tracking-widest">Estimated Total</p>
                    <p id="total-price" class="text-2xl font-black text-blue-600">Ksh 0</p>
                </div>
                <button id="submit-btn" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-black shadow-lg hover:scale-105 active:scale-95 transition-all">
                    BOOK NOW
                </button>
            </div>
            <p class="text-[9px] text-center text-gray-400 font-medium italic">
                *Final prices confirmed upon physical inspection at pick-up.
            </p>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        let cart = {}; 

        document.addEventListener('DOMContentLoaded', () => {
            const cfg = window.config;
            document.getElementById('biz-name').textContent = cfg.businessName;
            document.getElementById('biz-tagline').textContent = cfg.tagline;
            document.getElementById('header-bg').style.backgroundColor = cfg.primaryColor;
            document.getElementById('submit-btn').style.backgroundColor = cfg.primaryColor;
            
            const master = document.getElementById('services-master');
            cfg.categories.forEach(cat => {
                let html = `<div class="mb-10"><h3 class="text-[11px] font-black text-gray-400 uppercase tracking-widest mb-4 px-2">${cat.name}</h3><div class="grid gap-4">`;
                cat.items.forEach(item => {
                    html += `
                        <div id="card-${item.id}" class="service-card bg-white p-5 rounded-[1.5rem] border shadow-sm transition-all cursor-pointer" onclick="toggleItem('${item.id}')">
                            <div class="flex justify-between items-start">
                                <div class="pr-4">
                                    <span class="font-bold text-gray-800 block leading-tight">${item.name}</span>
                                    ${item.note ? `<p class="text-[9px] text-blue-500 font-bold mt-1 uppercase">★ ${item.note}</p>` : ''}
                                </div>
                                <span class="text-blue-600 font-black whitespace-nowrap text-sm">Ksh ${item.price}</span>
                            </div>
                            <div id="qty-wrapper-${item.id}" class="hidden mt-4 pt-4 border-t border-dashed flex justify-between items-center" onclick="event.stopPropagation()">
                                <span class="text-[10px] font-black text-gray-400 uppercase">Quantity:</span>
                                <div class="flex items-center gap-4">
                                    <button onclick="changeQty('${item.id}', -1)" class="qty-btn">-</button>
                                    <span id="qty-val-${item.id}" class="font-black text-lg text-gray-800 w-4 text-center">1</span>
                                    <button onclick="changeQty('${item.id}', 1)" class="qty-btn">+</button>
                                </div>
                            </div>
                        </div>`;
                });
                master.innerHTML += html + `</div></div>`;
            });
        });

        function findItem(id) { for (let cat of window.config.categories) { let found = cat.items.find(i => i.id === id); if (found) return found; } }
        
        function toggleItem(id) {
            const card = document.getElementById(`card-${id}`);
            const item = findItem(id);
            if (cart[id]) { 
                delete cart[id]; 
                card.classList.remove('active'); 
                if (item.type === 'qty') document.getElementById(`qty-wrapper-${id}`).classList.add('hidden'); 
            } else { 
                cart[id] = 1; 
                card.classList.add('active'); 
                if (item.type === 'qty') document.getElementById(`qty-wrapper-${id}`).classList.remove('hidden'); 
            }
            updateTotal();
        }

        function changeQty(id, delta) { 
            cart[id] = Math.max(1, (cart[id] || 1) + delta); 
            document.getElementById(`qty-val-${id}`).textContent = cart[id]; 
            updateTotal(); 
        }

        function updateTotal() {
            let total = 0;
            const summaryList = document.getElementById('summary-list');
            const summaryCard = document.getElementById('summary-card');
            let summaryHtml = "";

            for (let id in cart) {
                let item = findItem(id); 
                let qty = cart[id]; 
                let p = item.price;
                if (id === 'weight-standard') p = (qty >= 5) ? 50 : 70;
                total += (p * qty);
                summaryHtml += `• ${item.name} (x${qty})<br>`;
            }
            
            document.getElementById('total-price').textContent = `Ksh ${total}`;
            summaryList.innerHTML = summaryHtml;
            summaryCard.classList.toggle('hidden', Object.keys(cart).length === 0);
        }

        document.getElementById('submit-btn').addEventListener('click', function() {
            const name = document.getElementById('cust-name').value.trim();
            const phone = document.getElementById('cust-phone').value.trim();
            const loc = document.getElementById('location-desc').value.trim();
            const tot = document.getElementById('total-price').textContent;

            if (!name || !phone || !loc || Object.keys(cart).length === 0) {
                return alert("Please complete your details and select at least one service.");
            }

            const btn = this;
            btn.disabled = true;
            btn.textContent = "SENDING TO GOOGLE...";
            btn.classList.add('saving-pulse');

            let summary = Object.keys(cart).map(id => {
                const item = findItem(id);
                return `${item.name} (x${cart[id]})`;
            }).join(", ");

            const finalUrl = `${window.config.webAppUrl}?name=${encodeURIComponent(name)}&phone=${encodeURIComponent(phone)}&estate=${encodeURIComponent(loc)}&services=${encodeURIComponent(summary)}&totalPrice=${encodeURIComponent(tot)}`;
            
            // Fire and Forget fetch
            fetch(finalUrl, { method: 'GET', mode: 'no-cors' });

            setTimeout(() => {
                const msg = `*NEW ORDER - SWIFTCLEAN*\n---------------------------\n*Client:* ${name}\n*Phone:* ${phone}\n*Location:* ${loc}\n\n*Items:* ${summary}\n*Estimated Total:* ${tot}\n\n⚠️ _Note: Final prices confirmed upon pick-up._\n---------------------------\n*Payment: Buy Goods ${window.config.paymentDetails.tillNumber}(${window.config.PaymentDetails.officialName})*`;
                
                window.location.href = `https://wa.me/${window.config.whatsappNumber}?text=${encodeURIComponent(msg)}`;
                
                setTimeout(() => {
                    btn.disabled = false;
                    btn.textContent = "BOOK NOW";
                    btn.classList.remove('saving-pulse');
                }, 1500);
            }, 2000);
        });
    </script>
</body>
</html>
