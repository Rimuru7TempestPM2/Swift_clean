<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftClean Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .service-card.active { border-color: #0ea5e9; background-color: #f0f9ff; border-width: 2px; }
        .qty-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 10px; background: #f1f5f9; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-50 pb-32">
    <header id="header-bg" class="p-8 text-white text-center shadow-lg">
        <h1 id="biz-name" class="text-2xl font-black uppercase"></h1>
        <p id="biz-tagline" class="text-sm opacity-90"></p>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">
        <section class="bg-white p-6 rounded-3xl shadow-sm border">
            <h2 class="font-bold mb-4">1. Your Details</h2>
            <div class="space-y-3">
                <input type="text" id="cust-name" placeholder="Full Name" class="w-full p-3 bg-gray-50 border rounded-xl outline-none">
                <input type="tel" id="cust-phone" placeholder="Phone Number" class="w-full p-3 bg-gray-50 border rounded-xl outline-none">
                <input type="text" id="location-desc" placeholder="Location (Estate/House No)" class="w-full p-3 bg-gray-50 border rounded-xl outline-none">
            </div>
        </section>

        <section id="services-master" class="space-y-6">
            <h2 class="font-bold px-2">2. Choose Services</h2>
        </section>
    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-white p-6 border-t shadow-2xl z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div><p class="text-xs text-gray-400">Total Est.</p><p id="total-price" class="text-xl font-black text-blue-600">Ksh 0</p></div>
            <button id="submit-btn" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold">BOOK NOW</button>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        let cart = {};
        document.addEventListener('DOMContentLoaded', () => {
            const cfg = window.config;
            document.getElementById('biz-name').textContent = cfg.businessName;
            document.getElementById('biz-tagline').textContent = cfg.tagline;
            document.getElementById('header-bg').style.backgroundColor = cfg.primaryColor;
            document.getElementById('submit-btn').style.backgroundColor = cfg.primaryColor;

            cfg.categories.forEach(cat => {
                let html = `<div class="mb-6"><h3 class="text-xs font-bold text-gray-400 uppercase mb-3">${cat.name}</h3><div class="grid gap-3">`;
                cat.items.forEach(item => {
                    html += `<div id="card-${item.id}" class="service-card bg-white p-4 rounded-2xl border shadow-sm transition-all" onclick="toggleItem('${item.id}')">
                        <div class="flex justify-between items-center">
                            <div><span class="font-bold text-gray-800">${item.name}</span>
                            ${item.note ? `<p class="text-[10px] text-blue-500 font-bold mt-1">${item.note}</p>` : ''}</div>
                            <span class="font-bold text-blue-600">Ksh ${item.price}</span>
                        </div>
                        <div id="qty-wrapper-${item.id}" class="hidden mt-3 pt-3 border-t flex justify-between items-center" onclick="event.stopPropagation()">
                            <span class="text-xs text-gray-400">Quantity (${item.unit}):</span>
                            <div class="flex items-center gap-4">
                                <button onclick="changeQty('${item.id}', -1)" class="qty-btn">-</button>
                                <span id="qty-val-${item.id}" class="font-bold">1</span>
                                <button onclick="changeQty('${item.id}', 1)" class="qty-btn">+</button>
                            </div>
                        </div></div>`;
                });
                document.getElementById('services-master').innerHTML += html + `</div></div>`;
            });
        });

        function findItem(id) { for (let cat of window.config.categories) { let found = cat.items.find(i => i.id === id); if (found) return found; } }
        function toggleItem(id) {
            const item = findItem(id);
            if (cart[id]) { delete cart[id]; document.getElementById(`card-${id}`).classList.remove('active'); if (item.type === 'qty') document.getElementById(`qty-wrapper-${id}`).classList.add('hidden'); }
            else { cart[id] = 1; document.getElementById(`card-${id}`).classList.add('active'); if (item.type === 'qty') document.getElementById(`qty-wrapper-${id}`).classList.remove('hidden'); }
            updateTotal();
        }
        function changeQty(id, delta) { cart[id] = Math.max(1, cart[id] + delta); document.getElementById(`qty-val-${id}`).textContent = cart[id]; updateTotal(); }
        function updateTotal() {
            let total = 0;
            for (let id in cart) {
                let item = findItem(id);
                let price = item.price;
                if (id === 'weight-standard') price = (cart[id] >= 5) ? 50 : 70;
                total += (price * cart[id]);
            }
            document.getElementById('total-price').textContent = `Ksh ${total}`;
        }

        document.getElementById('submit-btn').addEventListener('click', function() {
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            const loc = document.getElementById('location-desc').value;
            const tot = document.getElementById('total-price').textContent;
            if (!name || !phone || !loc || Object.keys(cart).length === 0) return alert("Please fill all details and select a service!");

            this.disabled = true; this.textContent = "Processing...";
            let items = Object.keys(cart).map(id => `${findItem(id).name} (x${cart[id]})`).join(", ");

            fetch(window.config.webAppUrl + "?" + new URLSearchParams({name, phone, estate: loc, services: items, totalPrice: tot}), {method: 'POST', mode: 'no-cors'})
            .then(() => {
                const msg = `*NEW ORDER*\nClient: ${name}\nPhone: ${phone}\nLocation: ${loc}\nItems: ${items}\nTotal: ${tot}\n\n*Pay via Till:* ${window.config.tillNumber}\n_Note: Weight/Mattress verified at pick-up._`;
                window.location.href = `https://wa.me/${window.config.whatsappNumber}?text=${encodeURIComponent(msg)}`;
            });
        });
    </script>
</body>
</html>
