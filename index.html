<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Now</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-spinner { border-top-color: transparent; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">

    <header class="p-6 text-white shadow-md" id="header-bg">
        <div class="max-w-md mx-auto">
            <h1 id="biz-name" class="text-3xl font-bold tracking-tight">Loading...</h1>
            <p id="biz-tagline" class="opacity-90 text-sm mt-1"></p>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">
        <section class="bg-white rounded-xl shadow-sm p-5 border border-gray-100">
            <h2 class="text-xl font-bold mb-4">Our Services</h2>
            <div id="services-container" class="space-y-3"></div>
        </section>

        <section class="bg-white rounded-xl shadow-sm p-5 border border-gray-100">
            <h2 class="text-xl font-bold mb-4">Book a Pick-up</h2>
            <form id="booking-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Your Name</label>
                    <input type="text" name="name" required class="w-full p-4 bg-gray-50 border border-gray-200 rounded-lg outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Phone Number (M-Pesa)</label>
                    <input type="tel" name="phone" placeholder="07..." required class="w-full p-4 bg-gray-50 border border-gray-200 rounded-lg outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Select Service</label>
                    <select id="service-select" name="service" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-lg outline-none"></select>
                </div>

                <button type="submit" id="submit-btn" class="w-full py-4 px-6 rounded-xl text-white font-bold text-lg shadow-lg active:scale-95 transition-transform flex justify-center items-center">
                    <span id="btn-text">Confirm Booking</span>
                    <div id="btn-loader" class="hidden w-6 h-6 border-4 border-white border-solid rounded-full animate-spin loading-spinner"></div>
                </button>
            </form>
            <div id="status-msg" class="hidden mt-4 p-4 rounded-lg text-center font-medium"></div>
        </section>
    </main>

    <script src="config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cfg = window.config;
            if (!cfg) return;

            document.title = cfg.businessName;
            document.getElementById('biz-name').textContent = cfg.businessName;
            document.getElementById('biz-tagline').textContent = cfg.tagline;
            document.getElementById('header-bg').style.backgroundColor = cfg.primaryColor;
            document.getElementById('submit-btn').style.backgroundColor = cfg.primaryColor;

            const servicesList = document.getElementById('services-container');
            const serviceSelect = document.getElementById('service-select');

            cfg.services.forEach(s => {
                servicesList.innerHTML += `
                    <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg border-l-4" style="border-color: ${cfg.primaryColor}">
                        <span class="font-medium text-gray-700">${s.name}</span>
                        <span class="font-bold text-gray-900">${s.price}</span>
                    </div>`;
                serviceSelect.innerHTML += `<option value="${s.name}">${s.name}</option>`;
            });

            const form = document.getElementById('booking-form');
            const btn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const btnLoader = document.getElementById('btn-loader');
            const statusMsg = document.getElementById('status-msg');

            form.addEventListener('submit', function(e) {
                e.preventDefault();
                btn.disabled = true;
                btnText.classList.add('hidden');
                btnLoader.classList.remove('hidden');

                // Convert form data to URL parameters (Crucial for Google Apps Script)
                const formData = new FormData(this);
                const params = new URLSearchParams(formData).toString();
                const finalUrl = cfg.webAppUrl + "?" + params;

                fetch(finalUrl, { method: 'POST', mode: 'no-cors' })
                    .then(() => {
                        statusMsg.textContent = "✅ Booking received! We will call you shortly.";
                        statusMsg.className = "mt-4 p-4 rounded-lg text-center font-medium bg-green-100 text-green-800";
                        statusMsg.classList.remove('hidden');
                        form.reset();
                    })
                    .catch(() => {
                        statusMsg.textContent = "❌ Connection error. Try again.";
                        statusMsg.className = "mt-4 p-4 rounded-lg text-center font-medium bg-red-100 text-red-800";
                        statusMsg.classList.remove('hidden');
                    })
                    .finally(() => {
                        btn.disabled = false;
                        btnText.classList.remove('hidden');
                        btnLoader.classList.add('hidden');
                    });
            });
        });
    </script>
</body>
</html>
