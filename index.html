<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftClean Booking Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .service-card.active { border-color: #0ea5e9; background-color: #f0f9ff; border-width: 2px; }
        .qty-btn { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 14px; font-weight: bold; background: #f8fafc; border: 1px solid #e2e8f0; }
        .qty-btn:active { transform: scale(0.95); background: #e2e8f0; }
    </style>
</head>
<body class="bg-gray-50 pb-40 font-sans">

    <header id="header-bg" class="p-10 text-white shadow-xl text-center">
        <h1 id="biz-name" class="text-3xl font-black uppercase tracking-tighter"></h1>
        <p id="biz-tagline" class="mt-2 text-sm font-medium opacity-90 italic"></p>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-8">
        <section class="bg-white rounded-[2rem] shadow-sm p-6 border border-gray-100">
            <h2 class="text-lg font-black mb-5 flex items-center gap-3">
                <span class="bg-blue-600 text-white w-8 h-8 rounded-full flex items-center justify-center text-xs">1</span>
                Your Details
            </h2>
            <div class="space-y-4">
                <input type="text" id="cust-name" placeholder="Full Name" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-400">
                <input type="tel" id="cust-phone" placeholder="Phone (M-Pesa)" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none">
                <textarea id="location-desc" placeholder="Location (Estate, Building, Apt)" rows="3" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none"></textarea>
            </div>
        </section>

        <section id="services-master" class="space-y-8">
            <h2 class="text-lg font-black px-2 flex items-center gap-3">
                <span class="bg-blue-600 text-white w-8 h-8 rounded-full flex items-center justify-center text-xs">2</span>
                Choose Services
            </h2>
        </section>
    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t p-6 shadow-2xl z-50">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <div>
                <p class="text-[10px] text-gray-400 uppercase font-black tracking-widest">Total Amount</p>
                <p id="total-price" class="text-2xl font-black text-blue-600">Ksh 0</p>
            </div>
            <button id="submit-btn" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black shadow-lg hover:bg-blue-700 transition-colors">
                BOOK NOW
            </button>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        let cart = {}; 
        document.addEventListener('DOMContentLoaded', () => {
            const cfg = window.config;
            document.getElementById('biz-name').textContent = cfg.businessName;
            document.getElementById('biz-tagline').textContent = cfg.tagline;
            document.getElementById('header-bg').style.backgroundColor = cfg.primaryColor;
            document.getElementById('submit-btn').style.backgroundColor = cfg.primaryColor;
            
            const master = document.getElementById('services-master');
            cfg.categories.forEach(cat => {
                let html = `<div class="mb-10"><h3 class="text-[11px] font-black text-gray-400 uppercase tracking-widest mb-4 px-2">${cat.name}</h3><div class="grid gap-4">`;
                cat.items.forEach(item => {
                    html += `
                        <div id="card-${item.id}" class="service-card bg-white p-5 rounded-[1.5rem] border shadow-sm transition-all" onclick="toggleItem('${item.id}')">
                            <div class="flex justify-between items-center cursor-pointer">
                                <div>
                                    <span class="font-bold text-gray-800 block">${item.name}</span>
                                    ${item.note ? `<p class="text-[10px] text-blue-500 font-bold mt-1 uppercase">★ ${item.note}</p>` : ''}
                                </div>
                                <span class="text-blue-600 font-black">Ksh ${item.price}</span>
                            </div>
                            <div id="qty-wrapper-${item.id}" class="hidden mt-4 pt-4 border-t border-dashed flex justify-between items-center" onclick="event.stopPropagation()">
                                <span class="text-xs font-bold text-gray-400 uppercase tracking-tighter">Adjust Qty:</span>
                                <div class="flex items-center gap-6">
                                    <button onclick="changeQty('${item.id}', -1)" class="qty-btn">-</button>
                                    <span id="qty-val-${item.id}" class="font-black text-lg text-gray-800">1</span>
                                    <button onclick="changeQty('${item.id}', 1)" class="qty-btn">+</button>
                                </div>
                            </div>
                        </div>`;
                });
                master.innerHTML += html + `</div></div>`;
            });
        });

        function findItem(id) { for (let cat of window.config.categories) { let found = cat.items.find(i => i.id === id); if (found) return found; } }
        
        function toggleItem(id) {
            const card = document.getElementById(`card-${id}`);
            const item = findItem(id);
            if (cart[id]) { 
                delete cart[id]; 
                card.classList.remove('active'); 
                if (item.type === 'qty') document.getElementById(`qty-wrapper-${id}`).classList.add('hidden'); 
            } else { 
                cart[id] = 1; 
                card.classList.add('active'); 
                if (item.type === 'qty') document.getElementById(`qty-wrapper-${id}`).classList.remove('hidden'); 
            }
            updateTotal();
        }

        function changeQty(id, delta) { 
            cart[id] = Math.max(1, (cart[id] || 1) + delta); 
            document.getElementById(`qty-val-${id}`).textContent = cart[id]; 
            updateTotal(); 
        }

        function updateTotal() {
            let total = 0;
            for (let id in cart) {
                let item = findItem(id); 
                let qty = cart[id]; 
                let p = item.price;
                if (id === 'weight-standard') p = (qty >= 5) ? 50 : 70;
                total += (p * qty);
            }
            document.getElementById('total-price').textContent = `Ksh ${total}`;
        }

        document.getElementById('submit-btn').addEventListener('click', function() {
            const name = document.getElementById('cust-name').value.trim();
            const phone = document.getElementById('cust-phone').value.trim();
            const loc = document.getElementById('location-desc').value.trim();
            const tot = document.getElementById('total-price').textContent;

            if (!name || !phone || !loc) return alert("Please fill Name, Phone, and Location.");
            if (Object.keys(cart).length === 0) return alert("Select at least one service.");

            // 1. Prepare Summary
            let summary = Object.keys(cart).map(id => `${findItem(id).name} (x${cart[id]})`).join(", ");

            // 2. Background Save to Google Sheet (non-blocking)
            fetch(window.config.webAppUrl + "?" + new URLSearchParams({ 
                name: name, 
                phone: phone, 
                estate: loc, 
                services: summary, 
                totalPrice: tot 
            }), { method: 'POST', mode: 'no-cors' });

            // 3. Open WhatsApp Immediately
            const msg = `*NEW ORDER*\n---------------------------\n*Client:* ${name}\n*Phone:* ${phone}\n*Location:* ${loc}\n*Items:* ${summary}\n*Total:* ${tot}\n---------------------------\n*Payment: Buy Goods ${window.config.tillNumber} (${window.config.officialName})*\n_Note: Weight/Mattress prices verified at pick-up._`;
            
            window.location.href = `https://wa.me/${window.config.whatsappNumber}?text=${encodeURIComponent(msg)}`;
        });
    </script>
</body>
</html>
